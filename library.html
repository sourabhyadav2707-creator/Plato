<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="favicon.png" type="image/png"/>
<title>Plato</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#111010;--surface:#181717;--surface2:#1e1d1d;--surface3:#222121;
  --line:#242323;--muted:#3e3d3d;--dim:#6b6a6a;--body:#a8a5a0;--text:#ede9e3;
  --serif:'Libre Baskerville',Georgia,serif;--sans:'Geist',system-ui,sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* TOPNAV */
.topnav{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;position:sticky;top:0;z-index:200;
  background:rgba(17,16,16,.9);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.topnav-brand{font-family:var(--serif);font-size:16px;color:var(--text);}
.topnav-date{font-size:11px;color:var(--dim);letter-spacing:.07em;text-transform:uppercase;}

/* FLOATING SIDEBAR — liquid glass */
.sidebar{
  position:fixed;left:18px;top:50%;transform:translateY(-50%);
  z-index:100;
  background:rgba(30,29,29,.55);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;
  gap:2px;
  min-height:280px;
  justify-content:space-between;
  box-shadow:0 16px 48px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-btn{
  width:42px;height:42px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;color:var(--dim);
  background:none;border:none;position:relative;
}
.nav-btn:hover{color:var(--body);background:rgba(255,255,255,.05);}
.nav-btn.active{color:var(--text);background:rgba(255,255,255,.07);}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;} .nav-btn i{font-size:18px;line-height:1;display:flex;}
.nav-btn::after{
  content:attr(data-tip);position:absolute;left:calc(100% + 14px);top:50%;
  transform:translateY(-50%);background:var(--surface2);border:1px solid var(--line);
  color:var(--text);font-size:11px;font-weight:500;padding:5px 12px;border-radius:7px;
  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;
}
.nav-btn:hover::after{opacity:1;}
.nav-sep{width:22px;height:1px;background:var(--line);margin:4px 0;flex-shrink:0;}

/* MAIN */
.main{margin-left:76px;padding:0 clamp(20px,3.5vw,52px);min-height:100vh;display:flex;align-items:center;}

/* EMPTY STATE */
.empty-wrap{
  display:flex;flex-direction:column;align-items:flex-start;
  padding:52px 0 40px;max-width:520px;
}
.empty-label{
  font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:clamp(20px,3vw,32px);
  display:flex;align-items:center;gap:12px;
}
.empty-label::before{content:'';width:28px;height:1px;background:var(--muted);flex-shrink:0;}
.empty-heading{
  font-family:var(--serif);font-size:clamp(28px,4vw,42px);
  font-weight:400;line-height:1.1;letter-spacing:-.025em;
  margin-bottom:16px;
}
.empty-heading em{font-style:italic;color:var(--body);}
.empty-body{font-size:14px;font-weight:300;color:var(--body);line-height:1.85;margin-bottom:32px;max-width:400px;}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--sans);font-size:13px;font-weight:500;color:var(--dim);
  border:1px solid var(--line);border-radius:8px;padding:10px 18px;
  transition:color .15s,border-color .15s;
}
.back-btn:hover{color:var(--body);border-color:var(--muted);}

/* USER MENU */
.user-menu-wrap{position:relative;}
.user-menu{
  display:none;
  position:absolute;left:calc(100% + 14px);bottom:0;
  min-width:180px;
  background:rgba(22,21,21,.88);
  border:1px solid rgba(255,255,255,.09);
  border-radius:14px;
  padding:10px;
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  box-shadow:0 16px 48px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.06);
  animation:menuIn .18s ease both;
  z-index:200;
}
.user-menu.open{display:block;}
@keyframes menuIn{
  from{opacity:0;transform:translateX(-6px) scale(.97);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.user-menu-name{
  font-size:12px;font-weight:500;color:var(--body);
  padding:6px 10px 8px;letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;
}
.user-menu-sep{height:1px;background:rgba(255,255,255,.07);margin:2px 0 6px;}
.user-menu-item{
  width:100%;display:flex;align-items:center;gap:9px;
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-size:13px;font-weight:400;
  padding:9px 10px;border-radius:8px;
  transition:background .15s;
  text-align:left;
}
.user-menu-item:hover{background:rgba(255,255,255,.06);}
.user-menu-item.signout{color:#e07070;}
.user-menu-item.signout svg{stroke:#e07070;}


@media(max-width:560px){
  .sidebar{display:none;}
  .main{margin-left:0;padding:0 24px;}
  .bottom-nav{
    display:flex;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--line);
    border-radius:26px;padding:10px 16px;width:310px;
    justify-content:space-evenly;align-items:center;
    z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.5);
  }
  .bottom-nav .nav-btn{width:44px;height:44px;border-radius:12px;}
  .bottom-nav .nav-btn::after{display:none;}
}
.bottom-nav{display:none;}
</style>
</head>
<body>

<!-- TOPNAV -->
<nav class="topnav">
  <div class="topnav-brand">Plato</div>
  <div class="topnav-date" id="dateDisplay"></div>
</nav>

<!-- FLOATING SIDEBAR -->
<aside class="sidebar">
  <button class="nav-btn" data-tip="Home" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
  <button class="nav-btn active" data-tip="Library" onclick="window.location.href='library.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M4 19V5a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v13"/><path d="M4 17h13a1 1 0 0 1 0 2H4"/></svg></button>
    <div class="user-menu-wrap">
      <button class="nav-btn" id="userMenuBtn" data-tip="Account" onclick="toggleUserMenu(event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg></button>
      <div class="user-menu" id="userMenu">
        <div class="user-menu-name" id="userMenuName">—</div>
        <div class="user-menu-sep"></div>
        <button class="user-menu-item signout" onclick="handleSignOut()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>
  <button class="nav-btn" data-tip="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="empty-wrap">
    <div class="empty-label">Library</div>
    <h1 class="empty-heading">Read more content<br>to <em>fill this up.</em></h1>
    <p class="empty-body">Briefings you've read will live here. Come back every day — your library grows one idea at a time.</p>
    <a class="back-btn" href="dashboard.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to today
    </a>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
  <button class="nav-btn active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M4 19V5a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v13"/><path d="M4 17h13a1 1 0 0 1 0 2H4"/></svg></button>
  <button class="nav-btn" onclick="window.location.href='dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a8.38 8.38 0 0 1 13 0"/></svg></button>
  <button class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

const { createClient } = window.supabase;
const sb = createClient(
  'https://hhzwejpaaqjlabpectsr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoendlanBhYXFqbGFicGVjdHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDMwMDcsImV4cCI6MjA4ODM3OTAwN30.WIl05K0XGh-5VaDZQR8iZDwZ2Gk7EKJzTv1-mxSvjfc'
);

// Auth guard
sb.auth.getSession().then(({ data: { session } }) => {
  if (!session) window.location.href = 'auth.html';
  else if (document.getElementById('userMenuName')) {
    document.getElementById('userMenuName').textContent = session.user.email;
  }
});

function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userMenu').classList.toggle('open');
}
document.addEventListener('click', () => {
  document.getElementById('userMenu')?.classList.remove('open');
});
async function handleSignOut() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}
</script>
</body>
</html>
